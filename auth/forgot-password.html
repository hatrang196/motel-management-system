<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - Welcome to 🏠</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/auth.css">
    <style>
        /* Đảm bảo Alert Box hiển thị đúng */
        .auth-alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .auth-alert.show { display: block; }
        .auth-alert-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .auth-alert-info { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: var(--dark-green);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="background-container">
        <img src="../assets/images/background.jpg" alt="Cozy Room" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="header">
        <h1 class="logo-title">
            Quên mật khẩu <span class="logo-emoji">🔑</span>
        </h1>
        <p class="subtitle">Chúng tôi sẽ giúp bạn lấy lại quyền truy cập</p>
    </div>

    <div class="container">
        <div class="auth-card">
            <h2 class="card-title">Khôi phục mật khẩu</h2>
            <p style="text-align: center; color: var(--text-light); font-size: 14px; margin-bottom: 25px;">
                Nhập email đã đăng ký, chúng tôi sẽ gửi mã OTP để xác nhận.
            </p>
            
            <div id="alertBox" class="auth-alert"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email đã đăng ký</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="Nhập email của bạn"
                            required
                        >
                        <span class="input-icon">📧</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Gửi mã xác thực</button>

                <div class="back-link">
                    <a href="login.html">← Quay lại đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/utilities.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        const forgotForm = document.getElementById('forgotPasswordForm');
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        forgotForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            // Hiệu ứng Loading
            const originalText = submitBtn.textContent;
            submitBtn.textContent = "Đang gửi...";
            submitBtn.disabled = true;

            // Giả lập gửi OTP (Logic thực tế sẽ nằm trong auth.js)
            setTimeout(() => {
                // Giả sử email tồn tại (Demo)
                alertBox.textContent = "Mã xác thực đã được gửi! (Demo OTP: 123456)";
                alertBox.className = "auth-alert auth-alert-info show";
                
                // Lưu email vào session để dùng ở trang verify-otp
                sessionStorage.setItem('reset_email', email);

                setTimeout(() => {
                    window.location.href = 'verify-otp.html';
                }, 3000);
            }, 1500);
        });
    </script>
</body>
</html>
