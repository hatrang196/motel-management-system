<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt chung - Motel Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #F4FBF4;
            --main-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #4b5563;
            --text-title: #9ca3af;
            --border-color: #f3f4f6;
        }

        /* Định nghĩa màu cho chế độ Tối (Dark Mode) */
        body.dark {
            --sidebar-bg: #1a1a1a;
            --main-bg: #121212;
            --card-bg: #242424;
            --text-main: #e5e7eb;
            --text-title: #6b7280;
            --border-color: #333333;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--main-bg); color: var(--text-main); transition: all 0.3s ease; }
        .sidebar-bg { background-color: var(--sidebar-bg); } 
        .card-style { background-color: var(--card-bg); border-color: var(--border-color); }
        .text-title-style { color: var(--text-title); }
        .nav-active { background-color: #BEE9BE !important; color: white !important; }
        .nav-active i { color: #2E7D32 !important; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-64 sidebar-bg h-full border-r border-gray-100 flex flex-col shrink-0 transition-colors duration-300">
        <div class="p-6 mb-4">
            <svg width="50" height="50" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10L10 45V90H90V45L50 10Z" fill="#88C488"/>
                <rect x="40" y="55" width="20" height="35" fill="#E5AA55"/>
                <path d="M50 5L5 45H15V85H85V45H95L50 5Z" stroke="#88C488" stroke-width="4"/>
            </svg>
        </div>

        <nav class="flex-1 px-4 overflow-y-auto">
            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-title-style uppercase mb-4">Nghiệp vụ</p>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-chart-simple w-6 text-xl"></i> <span class="font-semibold">Tổng Quan</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-dollar-sign w-6 text-xl"></i> <span class="font-semibold">Hóa Đơn</span></a>
            </div>

            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-title-style uppercase mb-4">Dữ liệu</p>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-house w-6 text-xl"></i> <span class="font-semibold">Phòng</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-wifi w-6 text-xl"></i> <span class="font-semibold">Dịch Vụ</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-droplet w-6 text-xl"></i> <span class="font-semibold">Điện Nước</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-user-group w-6 text-xl"></i> <span class="font-semibold">Khách Hàng</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-paperclip w-6 text-xl"></i> <span class="font-semibold">Hợp Đồng</span></a>
                <a href="#" class="flex items-center gap-4 p-3 hover:bg-black/5 rounded-lg transition"><i class="fa-solid fa-tag w-6 text-xl"></i> <span class="font-semibold">Giữ Phòng</span></a>
            </div>

            <div class="mt-auto pb-6">
                <p class="px-3 text-xs font-bold text-title-style uppercase mb-4">Nhà của tôi</p>
                <a href="cai-dat-chung.html" class="flex items-center gap-4 p-3 nav-active rounded-xl shadow-sm"><i class="fa-solid fa-gear w-6 text-xl"></i> <span class="font-bold">Cài Đặt Chung</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white dark:bg-[#1a1a1a] border-b border-gray-100 flex items-center justify-between px-8 transition-colors">
            <div class="flex items-center gap-3 text-gray-400">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Tìm kiếm..." class="bg-transparent outline-none text-sm w-64">
            </div>
            <div class="flex items-center gap-4">
                <i class="fas fa-ellipsis-v text-gray-400"></i>
                <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center"><i class="fas fa-user text-gray-500"></i></div>
            </div>
        </header>

        <div class="p-10 max-w-4xl">
            <h2 class="text-title-style font-bold uppercase text-xs mb-6 tracking-widest">Cài đặt hệ thống</h2>
            <div class="space-y-4 mb-10">
                <div onclick="toggleDarkMode(this)" class="card-style border p-5 rounded-xl flex justify-between items-center cursor-pointer hover:opacity-80 transition group shadow-sm">
                    <span class="font-semibold">Giao diện Sáng / Tối</span>
                    <div class="w-12 h-6 bg-gray-300 rounded-full relative transition toggle-bg">
                        <div id="dark-dot" class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 shadow-sm transition-all duration-300"></div>
                    </div>
                </div>
                
                <div onclick="toggleNotify(this)" class="card-style border p-5 rounded-xl flex justify-between items-center cursor-pointer hover:opacity-80 transition group shadow-sm">
                    <span class="font-semibold">Nhận thông báo hệ thống</span>
                    <div class="w-12 h-6 bg-gray-300 rounded-full relative transition toggle-bg-notify">
                        <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 shadow-sm transition-all duration-300 toggle-dot-notify"></div>
                    </div>
                </div>
            </div>

            <h2 class="text-title-style font-bold uppercase text-xs mb-6 tracking-widest">Cài đặt thông tin</h2>
            <a href="cai-dat-thong-tin.html" class="card-style border p-5 rounded-xl flex justify-between items-center cursor-pointer hover:opacity-80 transition shadow-sm">
                <span class="font-semibold">Chỉnh sửa thông tin tài khoản</span>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </a>
        </div>
    </main>

    <script>
        // Kiểm tra trạng thái tối đã lưu chưa
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('dark-dot').classList.add('translate-x-6');
        }

        function toggleDarkMode(el) {
            const isDark = document.body.classList.toggle('dark');
            const dot = el.querySelector('#dark-dot');
            const bg = el.querySelector('.toggle-bg');
            
            dot.classList.toggle('translate-x-6');
            bg.classList.toggle('bg-green-500');
            
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function toggleNotify(el) {
            el.querySelector('.toggle-dot-notify').classList.toggle('translate-x-6');
            el.querySelector('.toggle-bg-notify').classList.toggle('bg-green-500');
        }
    </script>
</body>
</html>
