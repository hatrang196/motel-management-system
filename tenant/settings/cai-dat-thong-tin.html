<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt thông tin - Portal Người Thuê</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #F4FBF4; 
            --main-bg: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #4b5563;
            --border-color: #f3f4f6;
            --input-bg: #ffffff;
        }

        body.dark {
            --sidebar-bg: #111111;
            --main-bg: #000000;
            --card-bg: #1a1a1a;
            --text-main: #f3f4f6;
            --border-color: #333333;
            --input-bg: #2a2a2a;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--main-bg); 
            color: var(--text-main); 
            transition: background-color 0.3s, color 0.3s; 
        }

        .sidebar-bg { background-color: var(--sidebar-bg); transition: background-color 0.3s; }
        .card-style { background-color: var(--card-bg); border: 1px solid var(--border-color); transition: all 0.3s; }
        .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-radius: 0.75rem; transition: 0.2s; font-weight: 600; }
        .nav-item:hover { background-color: rgba(0,0,0,0.05); }
        .dark .nav-item:hover { background-color: rgba(255,255,255,0.05); }
        .nav-active { background-color: #BEE9BE !important; color: #2E7D32 !important; }
        
        .input-custom { 
            background-color: var(--input-bg);
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 12px 16px; 
            width: 100%; 
            outline: none; 
            color: var(--text-main);
            transition: all 0.2s;
        }
        .input-custom:focus { border-color: #A3E4A1; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 sidebar-bg h-full border-r border-gray-100 dark:border-zinc-800 flex flex-col shrink-0 transition-colors duration-300">
        <div class="p-6 mb-4">
            <a href="../../auth/login.html" title="Quay về trang đăng nhập"> <svg width="50" height="50" viewBox="0 0 100 100" fill="none">
                    <path d="M50 10L10 45V90H90V45L50 10Z" fill="#88C488"/>
                    <rect x="40" y="55" width="20" height="35" fill="#E5AA55"/>
                    <path d="M50 5L5 45H15V85H85V45H95L50 5Z" stroke="#88C488" stroke-width="4"/>
                </svg>
            </a>
        </div>

        <nav class="flex-1 px-4 overflow-y-auto">
            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-gray-400 dark:text-zinc-300 uppercase mb-4 tracking-widest">Nghiệp vụ</p>
                <a href="../portal/tong-quan.html" class="nav-item dark:text-zinc-300">
                    <i class="fa-solid fa-chart-simple w-6 text-xl"></i> <span>Tổng Quan</span>
                </a>
                <a href="../invoices/hoa-don.html" class="nav-item dark:text-zinc-300">
                    <i class="fa-solid fa-dollar-sign w-6 text-xl"></i> <span>Hóa Đơn</span>
                </a>
            </div>

            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-gray-400 dark:text-zinc-300 uppercase mb-4 tracking-widest">Dữ liệu</p>
                <a href="../rooms/phong.html" class="nav-item dark:text-zinc-300"><i class="fa-solid fa-house w-6 text-xl"></i> <span>Phòng</span></a>
                <a href="../services/dich-vu.html" class="nav-item dark:text-zinc-300"><i class="fa-solid fa-wifi w-6 text-xl"></i> <span>Dịch Vụ</span></a>
                <a href="../utilities/dien-nuoc.html" class="nav-item dark:text-zinc-300"><i class="fa-solid fa-droplet w-6 text-xl"></i> <span>Điện Nước</span></a>
                <a href="../contracts/hop-dong.html" class="nav-item dark:text-zinc-300">
                    <i class="fa-solid fa-paperclip w-6 text-xl"></i> <span>Hợp Đồng</span>
                </a>
            </div>

            <div class="mt-auto pb-6">
                <p class="px-3 text-xs font-bold text-gray-400 dark:text-zinc-300 uppercase mb-4 tracking-widest">Nhà của tôi</p>
                <a href="cai-dat-chung.html" class="nav-item nav-active shadow-sm">
                    <i class="fa-solid fa-gear w-6 text-xl"></i> <span class="font-bold">Cài Đặt Chung</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white dark:bg-black border-b border-gray-100 dark:border-zinc-800 flex items-center justify-between px-8 shrink-0 relative transition-colors">
            <div class="relative w-96 flex items-center gap-3 text-gray-400">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" oninput="liveSearch(this.value)" placeholder="Tìm kiếm nhanh..." 
                    class="bg-transparent outline-none text-sm w-full py-2 dark:text-white dark:placeholder-zinc-600">
                <div id="search-results" class="hidden absolute top-full left-0 w-full bg-white dark:bg-[#121212] shadow-2xl border border-gray-100 dark:border-zinc-800 rounded-b-xl z-50 mt-1 max-h-60 overflow-y-auto"></div>
            </div>
            <div class="flex items-center gap-4">
                <i class="fas fa-ellipsis-v text-gray-400"></i>
                <div onclick="toggleProfile()" id="header-avatar" class="w-10 h-10 bg-gray-200 dark:bg-zinc-800 rounded-full flex items-center justify-center text-gray-500 overflow-hidden cursor-pointer hover:ring-2 ring-green-400 transition-all">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center gap-4 mb-6">
                    <a href="cai-dat-chung.html" class="text-gray-400 hover:text-green-500 transition"><i class="fa-solid fa-arrow-left text-lg"></i></a>
                    <h2 class="text-gray-400 dark:text-zinc-100 font-bold uppercase text-xs tracking-widest">Cài đặt thông tin tài khoản</h2>
                </div>

                <div class="card-style rounded-2xl p-8 shadow-sm mb-6">
                    <div class="flex flex-col items-center mb-8">
                        <div id="avatar-container" class="w-24 h-24 bg-gray-100 dark:bg-zinc-800 rounded-full flex items-center justify-center mb-4 overflow-hidden border-2 border-dashed border-gray-300 dark:border-zinc-700">
                            <i class="fa-regular fa-user text-4xl opacity-30"></i>
                        </div>
                        <button onclick="document.getElementById('upload-input').click()" class="bg-[#BEE9BE] text-[#2E7D32] px-6 py-1.5 rounded-lg text-xs font-bold hover:bg-green-200 transition">
                            Tải ảnh lên từ máy
                        </button>
                        <input type="file" id="upload-input" class="hidden" accept="image/*" onchange="previewUpload(this)">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <input type="text" id="fullname-input" class="input-custom" placeholder="Họ và tên *">
                        <input type="text" class="input-custom" placeholder="Giới tính">
                        <input type="text" class="input-custom" placeholder="Địa chỉ thường trú *">
                        <div class="relative">
                            <input type="text" class="input-custom" placeholder="Ngày sinh *">
                            <i class="fa-regular fa-calendar absolute right-4 top-4 text-gray-400"></i>
                        </div>
                        <input type="email" class="input-custom" placeholder="Email *">
                        <input type="text" class="input-custom" placeholder="Số điện thoại">
                    </div>
                </div>

                <div class="card-style rounded-2xl p-8 shadow-sm mb-6">
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <input type="text" class="input-custom" placeholder="CCCD *">
                        <div class="relative">
                            <input type="text" class="input-custom" placeholder="Ngày cấp *">
                            <i class="fa-regular fa-calendar absolute right-4 top-4 text-gray-400"></i>
                        </div>
                        <input type="text" class="input-custom" placeholder="Nơi cấp *">
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <input type="text" class="input-custom" placeholder="Nơi làm việc">
                        <input type="text" class="input-custom" placeholder="Chức vụ">
                        <input type="text" class="input-custom" placeholder="Địa chỉ làm việc">
                    </div>
                </div>

                <div class="flex justify-end mt-4">
                    <button onclick="saveUserInfo()" class="bg-[#333333] dark:bg-white dark:text-black text-white px-8 py-3 rounded-xl flex items-center gap-3 hover:opacity-90 transition font-semibold shadow-lg">
                        <i class="fa-solid fa-save"></i> Lưu thông tin
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="profile-container"></div>

    <script>
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // HÀM ĐỒNG BỘ TOÀN BỘ THÔNG TIN (ẢNH + TÊN)
        function syncUserInfo() {
            const savedAvatar = localStorage.getItem('userAvatar');
            const savedName = localStorage.getItem('userName');

            if(savedAvatar) {
                const imgHTML = `<img src="${savedAvatar}" class="w-full h-full object-cover">`;
                document.getElementById('avatar-container').innerHTML = imgHTML;
                document.getElementById('header-avatar').innerHTML = imgHTML;
                
                const profileImgContainer = document.querySelector('#profile-overlay .w-20.h-20');
                if(profileImgContainer) {
                    profileImgContainer.innerHTML = `<img src="${savedAvatar}" class="w-full h-full object-cover">`;
                }
            }

            if(savedName) {
                document.getElementById('fullname-input').value = savedName;
                const pName = document.querySelector('#profile-overlay h3');
                if(pName) pName.innerText = savedName;
            }
        }

        // HÀM LƯU THÔNG TIN KHI ẤN NÚT
        function saveUserInfo() {
            const nameValue = document.getElementById('fullname-input').value;
            if(!nameValue.trim()) return alert("Vui lòng nhập họ tên!");
            
            localStorage.setItem('userName', nameValue); // Lưu tên vào máy
            syncUserInfo(); // Cập nhật ngay sang bảng hồ sơ
            alert("Đã lưu thông tin thành công!");
        }

        function previewUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const base64Image = e.target.result;
                    localStorage.setItem('userAvatar', base64Image);
                    syncUserInfo();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        fetch('../profile/ho-so.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('profile-container').innerHTML = data;
                syncUserInfo();
            });

        function toggleProfile() {
            const overlay = document.getElementById('profile-overlay');
            if(overlay) overlay.classList.toggle('hidden');
        }

        const items = [
            { name: 'Tổng Quan', link: '../portal/tong-quan.html', icon: 'fa-chart-simple' },
            { name: 'Hợp Đồng', link: '../contracts/hop-dong.html', icon: 'fa-paperclip' },
            { name: 'Cài Đặt Chung', link: 'cai-dat-chung.html', icon: 'fa-gear' },
            { name: 'Phòng', link: '../rooms/phong.html', icon: 'fa-house' },
            { name: 'Điện Nước', link: '../utilities/dien-nuoc.html', icon: 'fa-droplet' },
            { name: 'Hóa Đơn', link: '../invoices/hoa-don.html', icon: 'fa-dollar-sign' }
        ];

        function liveSearch(val) {
            const res = document.getElementById('search-results');
            const term = val.toLowerCase().trim();
            if (!term) return res.classList.add('hidden');
            const filtered = items.filter(i => i.name.toLowerCase().includes(term));
            res.classList.remove('hidden');
            res.innerHTML = filtered.map(i => `
                <a href="${i.link}" class="flex items-center gap-3 p-3 hover:bg-green-50 dark:hover:bg-zinc-900 transition border-b border-gray-50 dark:border-zinc-800 last:border-none">
                    <i class="fa-solid ${i.icon} text-green-600"></i>
                    <span class="text-sm font-semibold dark:text-zinc-200">${i.name}</span>
                </a>
            `).join('') || '<p class="p-4 text-center text-xs text-gray-400 dark:text-zinc-500">Không tìm thấy kết quả</p>';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-input')) document.getElementById('search-results').classList.add('hidden');
        });

        window.onload = syncUserInfo;
    </script>
</body>
</html>
